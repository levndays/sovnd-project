<!DOCTYPE html>
<html>
<head>
    <title>SovND | Security Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0f172a; color: #f1f5f9; font-family: sans-serif; }
        .card-malicious { border: 1px solid #ef4444; background: rgba(127, 29, 29, 0.1); }
        .score-pill { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-8">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-10 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">SOVND COMMAND CENTER</h1>
                <p class="text-slate-400 text-sm">Kernel-Level Telemetry & Explainable Scoring</p>
            </div>
            <button onclick="fireAttack()" class="bg-slate-800 hover:bg-red-600 text-white text-sm font-bold py-2 px-6 rounded-md border border-slate-700 transition-all">
                SIMULATE MULTI-STAGE ATTACK
            </button>
        </div>

        <div class="grid grid-cols-12 gap-8">
            <div class="col-span-8">
                <div class="bg-slate-900 border border-slate-800 p-6 rounded-xl">
                    <h3 class="text-xs font-bold text-slate-500 uppercase mb-4">Throughput (Syscalls/sec)</h3>
                    <canvas id="chart" height="100"></canvas>
                </div>
            </div>
            <div class="col-span-4 space-y-4">
                <h3 class="text-xs font-bold text-slate-500 uppercase">Active Threat Stack</h3>
                <div id="alert-list" class="space-y-3">
                    <div class="text-center py-10 border border-dashed border-slate-800 rounded-xl text-slate-600 text-sm">Monitoring kernel space...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const sessionStartTime = new Date().getTime();
        console.log("Session started at:", sessionStartTime);
        const ctx = document.getElementById('chart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(40).fill(''),
                datasets: [{
                    data: Array(40).fill(0),
                    borderColor: '#3b82f6',
                    borderWidth: 2,
                    pointRadius: 0,
                    fill: true,
                    backgroundColor: 'rgba(59, 130, 246, 0.05)',
                    tension: 0.3
                }]
            },
            options: { scales: { y: { display: false }, x: { display: false } }, plugins: { legend: { display: false } }, animation: false }
        });

        const ws = new WebSocket(`ws://${window.location.host}/ws/telemetry`);
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            chart.data.datasets[0].data.push(data.eps);
            chart.data.datasets[0].data.shift();
            chart.update();

            const liveAlerts = data.alerts.filter(a => {
                const alertTime = new Date(a.timestamp).getTime();
                return alertTime > (sessionStartTime - 10000);
            });

            if (liveAlerts.length > 0) {
                document.getElementById('alert-list').innerHTML = liveAlerts.map(a => `
                    <div class="p-4 rounded-lg card-malicious transition-all">
                        <div class="flex justify-between items-start mb-2">
                            <span class="font-bold text-red-400 text-sm">PID ${a.pid} [${a.comm || 'unknown'}]</span>
                            <span class="px-2 py-0.5 rounded text-[10px] font-black bg-red-600 text-white">SCORE ${a.score}</span>
                        </div>
                        <div class="text-xs text-slate-300 mb-3">${a.reasons[0]}</div>
                        <div class="grid grid-cols-3 gap-1 text-[8px] uppercase font-bold text-slate-500">
                            <div class="score-pill p-1 rounded text-center">SIG: ${a.breakdown?.signature || 0}</div>
                            <div class="score-pill p-1 rounded text-center">STAT: ${a.breakdown?.statistical?.toFixed(1) || 0}</div>
                            <div class="score-pill p-1 rounded text-center">GRPH: ${a.breakdown?.graph || 0}</div>
                        </div>
                    </div>
                `).join('');
            }
        };

        function fireAttack() {
            console.log("Launching attack...");
            fetch('/api/attack', { method: 'POST' });
        }
    </script>
</body>
</html>
