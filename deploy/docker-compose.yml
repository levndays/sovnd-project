services:
  sovnd-monitor:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    cap_add:
      - BPF
      - PERFMON
      - SYS_ADMIN
      - SYS_PTRACE
      - NET_ADMIN
    pid: host
    network_mode: host
    environment:
      - DB_PATH=/app/data/sovnd.db
      - TARGET_LABEL=sovnd.monitor=true
    volumes:
      - /sys/kernel/debug:/sys/kernel/debug:rw
      - /sys/fs/bpf:/sys/fs/bpf:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - sovnd-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 10s
      timeout: 5s
      retries: 5

  web-app:
    image: nginx:latest
    container_name: web-app
    labels:
      - "sovnd.monitor=true"
    ports:
      - "8080:80"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "service", "nginx", "status"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  sovnd-data:
    driver: local
