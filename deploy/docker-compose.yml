services:
  sovnd-monitor:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    privileged: true
    pid: host
    network_mode: host
    environment:
      - DB_PATH=/app/data/sovnd.db
      - TARGET_LABEL=sovnd.monitor=true
    volumes:
      - /sys/kernel/debug:/sys/kernel/debug:rw
      - /sys/fs/bpf:/sys/fs/bpf:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - sovnd-data:/app/data
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 10s
      timeout: 5s
      retries: 5

  web-app:
    image: nginx:latest
    container_name: web-app
    labels:
      - "sovnd.monitor=true"
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "service", "nginx", "status"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  sovnd-data:
    driver: local
